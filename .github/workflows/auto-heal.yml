name: SRE Pipeline Surgeon

on: [push]

jobs:
  build-and-heal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Attempt Build
        run: mvn package > maven_output.log 2>&1 || echo "Build Failed - Triggering Surgeon"

      - name: Run Surgeon Agent
        run: |
          pip install requests
          python3 surgeon_agent.py

      - name: Check for Changes
        id: git-check
        run: |
          git config --global user.name 'SRE-Bot'
          git config --global user.email 'sre-bot@users.noreply.github.com'
          git add pom.xml
          git diff --quiet && git diff --staged --quiet || echo "modified=true" >> $GITHUB_OUTPUT

      - name: Commit and Push Fix
        if: steps.git-check.outputs.modified == 'true'
        run: |
          git commit -m "chore: automated SRE surgery - fixed missing dependencies"
          git push
