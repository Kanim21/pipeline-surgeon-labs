name: SRE Pipeline Surgeon
on: [push]
jobs:
  build-and-heal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Build
        run: mvn package > maven_output.log 2>&1 || python3 surgeon_agent.py
      - name: Commit Fix
        run: |
          git config --global user.name 'SRE-Bot'
          git config --global user.email 'sre-bot@users.noreply.github.com'
          git add pom.xml
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: automated SRE surgery" && git push)
