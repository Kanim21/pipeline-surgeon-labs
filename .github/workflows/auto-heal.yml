name: Auto-Heal Pipeline

on: [push]

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-heal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Build
        id: build
        shell: bash
        continue-on-error: true
        run: |
          set -o pipefail
          mvn package 2>&1 | tee maven_output.log

      - name: Set up Python
        if: steps.build.outcome == 'failure'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install surgeon dependencies
        if: steps.build.outcome == 'failure'
        run: pip install -r requirements.txt

      - name: Run surgeon agent
        if: steps.build.outcome == 'failure'
        id: surgeon
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPO_ROOT: ${{ github.workspace }}
        shell: bash
        continue-on-error: true
        run: |
          set +e
          python3 -m surgeon.agent \
            --log maven_output.log \
            --output-diagnosis diagnosis.json \
            --output-pr-body pr_body.md
          SURGEON_EXIT=$?
          echo "exit_code=$SURGEON_EXIT" >> "$GITHUB_OUTPUT"
          exit $SURGEON_EXIT

      - name: Open fix PR
        if: steps.build.outcome == 'failure' && steps.surgeon.outputs.exit_code == '0'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: [surgeon] proposed fix for ${{ github.sha }}"
          branch: surgeon/fix-${{ github.run_id }}
          base: main
          title: "[surgeon] proposed fix — build ${{ github.run_id }}"
          body-path: pr_body.md
          labels: "surgeon,automated-fix"

      - name: Open diagnostic PR
        if: steps.build.outcome == 'failure' && (steps.surgeon.outputs.exit_code == '2' || steps.surgeon.outputs.exit_code == '3')
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: [surgeon] diagnostic report for ${{ github.sha }}"
          branch: surgeon/diagnostic-${{ github.run_id }}
          base: main
          title: "[surgeon] unable to diagnose — human review needed"
          body-path: pr_body.md
          labels: "surgeon,needs-human-review"

  test-surgeon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run classification tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPO_ROOT: ${{ github.workspace }}
        run: pytest tests/ -v
